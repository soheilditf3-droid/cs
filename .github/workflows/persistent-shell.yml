name: Persistent Shell (6 hours)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Create watcher script
        run: |
          cat > /home/runner/watcher.sh << 'EOF'
          #!/bin/bash
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main

          last_mtime=0
          while true; do
            if [ -f command.txt ]; then
              current_mtime=$(stat -c %Y command.txt)
              if [ "$current_mtime" -gt "$last_mtime" ]; then
                command=$(cat command.txt)
                last_mtime=$current_mtime
                echo "----------------------------------------" >> output.txt
                echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] $ $command" >> output.txt
                eval "$command" >> output.txt 2>&1
                echo "" >> output.txt
                git add output.txt
                git commit -m "Executed: $command" || true
                git push https://soheilditf3-droid:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
              fi
            fi
            sleep 3
          done
          EOF
          chmod +x /home/runner/watcher.sh

      - name: Run persistent loop (6 hours)
        run: /home/runner/watcher.sh
