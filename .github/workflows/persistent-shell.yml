name: Persistent Shell (6 hours)

on:
  # Manually start from GitHub UI or CLI
  workflow_dispatch:
  # Optionally auto‑restart every 6 hours (adjust cron if needed)
  # schedule:
  #   - cron: '0 */6 * * *'

# Grant write permissions to push output.txt and state.tar.gz
permissions:
  contents: write

jobs:
  command-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360           # 6 hours max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # needed for state restore

      - name: Restore previous state
        run: |
          # If a state archive exists, unpack it into the runner's home
          if [ -f state.tar.gz ]; then
            echo "Restoring state ..."
            tar -xzf state.tar.gz -C /home/runner
          fi

      - name: Create command processing loop
        run: |
          cat > /home/runner/process_commands.sh << 'EOF'
#!/bin/bash
set -e

# File paths
COMMAND_FILE="command.txt"
OUTPUT_FILE="output.txt"
STATE_FILE="state.tar.gz"
LAST_SHA=""

# Git configuration (using PAT for push rights)
git config user.name "github-actions[bot]"
git config user.email "github-actions[bot]@users.noreply.github.com"

# Ensure we have the latest state before starting
git pull origin main

echo "Persistent shell started. Waiting for commands in $COMMAND_FILE ..."

while true; do
    # Check if command.txt exists and has content
    if [ -f "$COMMAND_FILE" ]; then
        CURRENT_SHA=$(sha256sum "$COMMAND_FILE" | cut -d' ' -f1)

        # Execute only if file content changed
        if [ "$CURRENT_SHA" != "$LAST_SHA" ]; then
            COMMAND=$(cat "$COMMAND_FILE")
            LAST_SHA="$CURRENT_SHA"

            echo "----------------------------------------" >> "$OUTPUT_FILE"
            echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] \$ $COMMAND" >> "$OUTPUT_FILE"

            # Run the command, capture stdout+stderr
            # Use `eval` to handle quotes and pipes properly
            if eval "$COMMAND" >> "$OUTPUT_FILE" 2>&1; then
                echo "[Exit code: 0]" >> "$OUTPUT_FILE"
            else
                echo "[Exit code: $?]" >> "$OUTPUT_FILE"
            fi
            echo "" >> "$OUTPUT_FILE"

            # Commit and push the updated output
            git add "$OUTPUT_FILE"
            git commit -m "Execute: $COMMAND" || true
            git push https://soheilditf3-droid:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main

            # Save runner state (home directory) after each command
            # This preserves pip installs, virtual envs, etc.
            tar -czf "$STATE_FILE" -C /home/runner . --exclude="work/.*" --exclude=".cache" 2>/dev/null || true
            git add "$STATE_FILE"
            git commit -m "Update state snapshot" || true
            git push https://soheilditf3-droid:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main

            echo "✅ Command executed and state saved."
        fi
    fi

    # Wait before checking again (reduce API load)
    sleep 3
done
EOF
          chmod +x /home/runner/process_commands.sh

      - name: Run persistent command processor
        run: |
          /home/runner/process_commands.sh

      - name: Save final state (on workflow stop)
        if: always()
        run: |
          tar -czf state.tar.gz -C /home/runner . --exclude="work/.*" --exclude=".cache" 2>/dev/null || true
          git add state.tar.gz
          git commit -m "Save final state before stopping" || true
          git push https://soheilditf3-droid:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
