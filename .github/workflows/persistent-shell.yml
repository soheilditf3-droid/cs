name: Persistent Shell (6 hours)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Run persistent watcher
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: ./watcher.sh
