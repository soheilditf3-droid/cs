name: Persistent Shell (6 hours)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Persistent command loop
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get the initial SHA of command.txt (if it exists)
          last_sha=$(git log -1 --format=%H -- command.txt 2>/dev/null || echo "")

          # Heartbeat counter
          heartbeat=0

          while true; do
            # Heartbeat every 30 seconds (visible in logs)
            if [ $((heartbeat % 10)) -eq 0 ]; then
              echo "[heartbeat] Still running at $(date -u +'%H:%M:%S')"
            fi
            heartbeat=$((heartbeat + 1))

            # Check if command.txt has changed (by comparing commit SHA)
            current_sha=$(git log -1 --format=%H -- command.txt 2>/dev/null || echo "")
            if [ "$current_sha" != "$last_sha" ] && [ -n "$current_sha" ]; then
              # New command detected
              last_sha="$current_sha"
              command=$(cat command.txt)
              echo "----------------------------------------" >> output.txt
              echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] $ $command" >> output.txt
              eval "$command" >> output.txt 2>&1
              echo "" >> output.txt

              # Push the updated output (ignore errors)
              git add output.txt
              git commit -m "Execute: $command" || true
              git push https://soheilditf3-droid:${PAT}@github.com/soheilditf3-droid/cs.git main || true
            fi

            sleep 3
          done
