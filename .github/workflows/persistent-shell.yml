name: Persistent Shell (6 hours)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  command-server:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore state
        run: |
          if [ -f state.tar.gz ]; then
            tar -xzf state.tar.gz -C /home/runner
          fi

      - name: Create processor script
        run: |
          cat > /home/runner/process.sh << 'EOF'
          #!/bin/bash
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main

          LAST_SHA=""
          while true; do
              if [ -f command.txt ]; then
                  CURRENT_SHA=$(sha256sum command.txt | cut -d' ' -f1)
                  if [ "$CURRENT_SHA" != "$LAST_SHA" ]; then
                      COMMAND=$(cat command.txt)
                      LAST_SHA="$CURRENT_SHA"
                      echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] \$ $COMMAND" >> output.txt
                      eval "$COMMAND" >> output.txt 2>&1
                      git add output.txt
                      git commit -m "Execute: $COMMAND" || true
                      git push https://soheilditf3-droid:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
                  fi
              fi
              sleep 3
          done
          EOF
          chmod +x /home/runner/process.sh

      - name: Run command processor
        run: /home/runner/process.sh

      - name: Save final state
        if: always()
        run: |
          tar -czf state.tar.gz -C /home/runner . --exclude="work/.*" --exclude=".cache" 2>/dev/null || true
          git add state.tar.gz
          git commit -m "Save state" || true
          git push https://soheilditf3-droid:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git main
