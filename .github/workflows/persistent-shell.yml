name: Persistent Shell (6 hours)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runner:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Persistent command loop
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          last_command=""
          heartbeat=0

          while true; do
            # Heartbeat every 30 seconds
            if [ $((heartbeat % 10)) -eq 0 ]; then
              echo "[heartbeat] Still running at $(date -u +'%H:%M:%S')"
            fi
            heartbeat=$((heartbeat + 1))

            # Pull latest changes (including new command.txt)
            git pull origin main --quiet || true

            # Read the latest command
            current_command=$(cat command.txt 2>/dev/null)

            if [ -n "$current_command" ] && [ "$current_command" != "$last_command" ]; then
              last_command="$current_command"
              echo "----------------------------------------" >> output.txt
              echo "[$(date -u +'%Y-%m-%d %H:%M:%S UTC')] $ $current_command" >> output.txt
              eval "$current_command" >> output.txt 2>&1
              echo "" >> output.txt

              # Push the updated output
              git add output.txt
              git commit -m "Execute: $current_command" || true
              git push https://soheilditf3-droid:${PAT}@github.com/soheilditf3-droid/cs.git main || true
            fi

            sleep 3
          done
